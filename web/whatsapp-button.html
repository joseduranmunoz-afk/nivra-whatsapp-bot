<!-- Estilos del botón -->
<style>
  .whatsapp-float {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 10px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  .whatsapp-bubble {
    background: white;
    border-radius: 12px;
    padding: 12px 16px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    font-size: 14px;
    color: #333;
    max-width: 220px;
    line-height: 1.4;
    animation: fadeIn 0.3s ease;
    display: none;
  }

  .whatsapp-bubble strong {
    display: block;
    margin-bottom: 2px;
    color: #111;
  }

  .whatsapp-btn {
    width: 60px;
    height: 60px;
    background: #25D366;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(37, 211, 102, 0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none;
  }

  .whatsapp-btn:hover {
    transform: scale(1.1);
    box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
  }

  .whatsapp-btn svg {
    width: 32px;
    height: 32px;
    fill: white;
  }

  .whatsapp-pulse {
    position: absolute;
    width: 60px;
    height: 60px;
    border-radius: 50%;
    background: #25D366;
    opacity: 0.4;
    animation: pulse 2s infinite;
  }

  .whatsapp-close {
    position: absolute;
    top: 8px;
    right: 8px;
    width: 18px;
    height: 18px;
    background: none;
    border: none;
    cursor: pointer;
    color: #999;
    font-size: 16px;
    line-height: 1;
    padding: 0;
  }

  @keyframes pulse {
    0% { transform: scale(1); opacity: 0.4; }
    70% { transform: scale(1.4); opacity: 0; }
    100% { transform: scale(1.4); opacity: 0; }
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<!-- Botón flotante -->
<div class="whatsapp-float" id="waFloat">

  <!-- Burbuja de mensaje -->
  <div class="whatsapp-bubble" id="waBubble">
    <button class="whatsapp-close" onclick="closeBubble()">×</button>
    <strong>¡Hola! 👋 Soy el asistente de Nivra</strong>
    ¿Listo para hacer crecer tu empresa? Escríbeme ahora.
  </div>

  <!-- Botón principal -->
  <div style="position:relative;">
    <div class="whatsapp-pulse"></div>
    <a class="whatsapp-btn"
       href="https://wa.me/14155238886?text=Hola%20Nivra%2C%20me%20interesa%20conocer%20sus%20servicios%20de%20consultor%C3%ADa"
       target="_blank"
       rel="noopener"
       onclick="trackClick()"
       title="Chatea con Nivra Consulting">

      </svg>
    </a>
  </div>

</div>

<!-- Script -->
<script>
  // Mostrar burbuja después de 3 segundos
  setTimeout(() => {
    const bubble = document.getElementById('waBubble');
    if (bubble) bubble.style.display = 'block';
  }, 3000);

  function closeBubble() {
    document.getElementById('waBubble').style.display = 'none';
    // No volver a mostrar en esta sesión
    sessionStorage.setItem('waBubbleClosed', 'true');
  }

  // No mostrar si ya cerró en esta sesión
  if (sessionStorage.getItem('waBubbleClosed') === 'true') {
    document.querySelector('.whatsapp-bubble').style.display = 'none';
  }

  function trackClick() {
    // Google Analytics (si está disponible)
    if (typeof gtag !== 'undefined') {
      gtag('event', 'whatsapp_click', {
        event_category: 'Lead',
        event_label: 'WhatsApp Button'
      });
    }
    // Facebook Pixel (si está disponible)
    if (typeof fbq !== 'undefined') {
      fbq('track', 'Contact');
    }
  }
</script>
